<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Preview Card</title>

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700&family=Fraunces:wght@700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="abc.css">
</head>
<body>

    <div class="card">

        <div class="card-image">
            <img src="https://images.unsplash.com/photo-1541643600914-78b084683601?w=800" alt="Perfume">
        </div>

        <div class="card-content">

            <p class="category">PERFUME</p>

            <h1>Gabrielle Essence Eau De Parfum</h1>

            <p class="description">
                A floral, solar and voluptuous interpretation composed by
                Olivier Polge, Perfumer-Creator for Chanel.
            </p>

            <div class="price">
                <span class="new-price">$149.99</span>
                <span class="old-price">$169.99</span>
            </div>

            <button>
                🛒 Add to Cart
            </button>

        </div>

    </div>

</body>
</html>
