<!DOCTYPE html>
<html>
<head>
    <title>Simple Time Table</title>
</head>
<body>

    <h2>School Time Table</h2>

    <table border="1" cellpadding="10">
        <tr>
            <th>Day</th>
            <th>Subject</th>
            <th>Time</th>
        </tr>

        <tr>
            <td>Monday</td>
            <td>Math</td>
            <td>9 AM - 10 AM</td>
        </tr>

        <tr>
            <td>Tuesday</td>
            <td>Science</td>
            <td>10 AM - 11 AM</td>
        </tr>

        <tr>
            <td>Wednesday</td>
            <td>English</td>
            <td>11 AM - 12 PM</td>
        </tr>

    </table>

</body>
</html>
