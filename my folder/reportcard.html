<!DOCTYPE html>
<html>
<head>
    <title>Student Report Card</title>
</head>
<body>

    <table border="1">

        <!-- Table Heading -->
        <caption><b>Student Report Card</b></caption>

        <!-- Top Information Row -->
        <tr>
            <td colspan="5" align="center">
                <b>Student: Atul Gautam | Class: 10th | Year: 2025</b>
            </td>
        </tr>

        <!-- Table Header -->
        <thead>
            <tr>
                <th>Sr.</th>
                <th>Subject</th>
                <th>Unit Test 1</th>
                <th>Unit Test 2</th>
                <th>Total</th>
            </tr>
        </thead>

        <!-- Table Body -->
        <tbody>
            <tr>
                <td>1</td>
                <td>Maths</td>
                <td>45</td>
                <td>48</td>
                <td>93</td>
            </tr>

            <tr>
                <td>2</td>
                <td>Science</td>
                <td>40</td>
                <td>42</td>
                <td>82</td>
            </tr>

            <tr>
                <td>3</td>
                <td>English</td>
                <td>38</td>
                <td>44</td>
                <td>82</td>
            </tr>
        </tbody>

        <!-- Footer Section -->
        <tfoot>
            <tr>
                <td colspan="4" align="center">
                    <b>Grand Total</b>
                </td>
                <td><b>257</b></td>
            </tr>
        </tfoot>

    </table>

</body>
</html>
