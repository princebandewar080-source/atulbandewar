
<!DOCTYPE html>
<html>
<head>
    <title>HTML Table</title>

    <style>
        table{
            width: 60%;
            border-collapse: collapse;
            margin: 50px auto;
        }

        th, td{
            border: 1px solid black;
            padding: 10px;
            text-align: center;
        }

       
    </style>
</head>

<body>

<table>
    <tr>
        <th>Name</th>
        <th>Age</th>
        <th>City</th>
    </tr>

    <tr>
        <td>Atul</td>
        <td>18</td>
        <td>Balaghat</td>
    </tr>

    <tr>
        <td>Rahul</td>
        <td>20</td>
        <td>Delhi</td>
    </tr>
    <tr>
        <td>ramu</td>
        <td>19</td>
        <td>parswada</td>
    </tr>

</table>

</body>
</html>
