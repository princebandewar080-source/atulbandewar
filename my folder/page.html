   <style>

        body{
            margin: 0;
            padding: 0;
            font-family: Arial;
            background-color: #f2f2f2;
        }

        /* Header */

        .header-section{
            background-color: rgb(118, 192, 118);
            padding: 20px;
            text-align: center;
        }

        /* Navigation */

        .nav-li{
            display: inline-block;
            margin: 10px;
            padding: 10px;
            background-color: white;
            border-radius: 5px;
            font-weight: bold;
        }

        /* Main */

        .main-section{
            padding: 20px;
        }

        /* Div Box */

        .box{
            background-color: white;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 10px;
        }

        /* Table */

        table{
            width: 100%;
            border-collapse: collapse;
        }

        th{
            background-color: lightgreen;
            padding: 10px;
        }

        td{
            padding: 10px;
            text-align: center;
        }

        /* Footer */

        .footer-section{
            background-color: black;
            color: white;
            text-align: center;
            padding: 15px;
        }

    </style>

</head>
<body>

    <!-- Header -->

    <header class="header-section">

        <img src="https://via.placeholder.com/120"
             alt="logo">

        <!-- Navbar -->

        <nav>

            <ul style="list-style-type: none;">

                <li class="nav-li">Home</li>
                <li class="nav-li">About</li>
                <li class="nav-li">Services</li>

            </ul>

        </nav>

    </header>

    <!-- Main -->

    <main class="main-section">

        <!-- Div 1 -->

        <div class="box">

            <h2>HTML Basics</h2>

            <p>
                HTML is used to create the structure of webpages.
            </p>

        </div>

        <!-- Div 2 -->

        <div class="box">

            <h2>CSS Styling</h2>

            <p>
                CSS is used to design webpages with colors and layouts.
            </p>

        </div>

        <!-- Div 3 -->

        <div class="box">

            <h2>Student Table</h2>

            <table border="1">

                <tr>
                    <th>Name</th>
                    <th>Course</th>
                    <th>Marks</th>
                </tr>

                <tr>
                    <td>Atul</td>
                    <td>HTML</td>
                    <td>85</td>
                </tr>

                <tr>
                    <td>Rahul</td>
                    <td>CSS</td>
                    <td>90</td>
                </tr>

            </table>

        </div>

    </main>

    <!-- Footer -->

    <footer class="footer-section">

        <p>
            Copyright &copy; 2026 My Website
        </p>

    </footer>

</body>
</html>
